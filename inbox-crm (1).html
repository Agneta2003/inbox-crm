<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inbox CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222d;
    --border: #2e2e3d;
    --accent: #7c6ef7;
    --accent2: #f7c26e;
    --green: #5de8a0;
    --red: #f7706e;
    --blue: #6ec8f7;
    --text: #eeeef5;
    --muted: #8888aa;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; }

  /* TOP BAR */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .stats-pill {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 14px; font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px;
  }
  .stats-pill b { color: var(--text); }
  .btn {
    font-family: var(--font-body); font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none;
    padding: 8px 18px; border-radius: 8px; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9585ff; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* LAYOUT */
  .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

  /* SIDEBAR */
  aside {
    width: 220px; min-width: 220px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0;
    overflow-y: auto;
  }
  .sidebar-section { padding: 8px 16px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); margin-top: 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 18px;
    font-size: 0.875rem; color: var(--muted); cursor: pointer; border-left: 3px solid transparent;
    transition: all 0.12s; user-select: none;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--text); border-left-color: var(--accent); background: var(--surface2); }
  .nav-icon { width: 18px; text-align: center; font-size: 1rem; }
  .badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 0.68rem;
    border-radius: 10px; padding: 1px 7px; font-weight: 600; }

  /* MAIN */
  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* TOOLBAR */
  .toolbar {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--surface);
  }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 36px; color: var(--text); font-family: var(--font-body); font-size: 0.875rem;
    outline: none; transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; pointer-events: none; }
  .filter-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px;
    border-radius: 8px; font-family: var(--font-body); font-size: 0.85rem; outline: none; cursor: pointer;
  }

  /* TABLE / LIST */
  .contacts-area { flex: 1; overflow-y: auto; padding: 0; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2); padding: 10px 16px; font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); font-weight: 600; text-align: left; border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 13px 16px; font-size: 0.875rem; vertical-align: middle; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8rem; font-family: var(--font-head); flex-shrink: 0;
  }
  .name-cell { display: flex; align-items: center; gap: 10px; }
  .name-cell .name { font-weight: 500; }
  .name-cell .company { font-size: 0.75rem; color: var(--muted); }
  .tag {
    display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3px;
  }
  .tag-new { background: rgba(124,110,247,0.15); color: var(--accent); }
  .tag-inprogress { background: rgba(247,194,110,0.15); color: var(--accent2); }
  .tag-done { background: rgba(93,232,160,0.15); color: var(--green); }
  .tag-lost { background: rgba(247,112,110,0.15); color: var(--red); }
  .td-actions { display: flex; gap: 6px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem;
    padding: 4px; border-radius: 5px; transition: color 0.12s, background 0.12s; }
  .icon-btn:hover { color: var(--text); background: var(--border); }
  .last-msg { color: var(--muted); font-size: 0.8rem; max-width: 200px; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis; }

  /* EMPTY */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 20px; color: var(--muted); gap: 12px; }
  .empty .emoji { font-size: 3rem; }
  .empty p { font-size: 0.9rem; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    width: 480px; max-width: 95vw; padding: 28px; display: flex; flex-direction: column; gap: 18px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: popIn 0.18s ease;
  }
  @keyframes popIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.78rem; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; }
  input[type=text], input[type=email], input[type=tel], textarea, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text); font-family: var(--font-body); font-size: 0.875rem; outline: none;
    transition: border-color 0.15s; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }

  /* DETAIL PANEL */
  .detail-panel {
    width: 340px; min-width: 340px; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; transition: width 0.2s;
  }
  .detail-panel.hidden { width: 0; min-width: 0; overflow: hidden; }
  .panel-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .panel-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 1.2rem; font-weight: 800; font-family: var(--font-head); flex-shrink: 0; }
  .panel-name { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; }
  .panel-sub { font-size: 0.8rem; color: var(--muted); }
  .panel-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
  .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .panel-section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 700; margin-bottom: 12px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.84rem; }
  .info-row .key { color: var(--muted); }
  .info-row .val { font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }
  .notes-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; color: var(--text); font-family: var(--font-body); font-size: 0.84rem; min-height: 90px;
    resize: vertical; outline: none; }
  .notes-area:focus { border-color: var(--accent); }
  .save-note-btn { margin-top: 8px; width: 100%; }

  /* COLORS for avatars */
  .c0 { background: rgba(124,110,247,0.2); color: var(--accent); }
  .c1 { background: rgba(247,194,110,0.2); color: var(--accent2); }
  .c2 { background: rgba(93,232,160,0.2); color: var(--green); }
  .c3 { background: rgba(110,200,247,0.2); color: var(--blue); }
  .c4 { background: rgba(247,112,110,0.2); color: var(--red); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .no-select { user-select: none; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Inbox<span>CRM</span></div>
  <div class="header-actions">
    <div class="stats-pill">
      <span>Contacts: <b id="totalCount">0</b></span>
      <span>Open: <b id="openCount">0</b></span>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Contact</button>
  </div>
</header>

<!-- APP BODY -->
<div class="app">
  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">Views</div>
    <div class="nav-item active no-select" onclick="setFilter('all',this)">
      <span class="nav-icon">📋</span> All Contacts <span class="badge" id="allBadge">0</span>
    </div>
    <div class="nav-item no-select" onclick="setFilter('New Lead',this)">
      <span class="nav-icon">🌱</span> New Leads <span class="badge" id="newBadge">0</span>
    </div>
    <div class="nav-item no-select" onclick="setFilter('In Progress',this)">
      <span class="nav-icon">⚡</span> In Progress
    </div>
    <div class="nav-item no-select" onclick="setFilter('Closed',this)">
      <span class="nav-icon">✅</span> Closed
    </div>
    <div class="nav-item no-select" onclick="setFilter('Lost',this)">
      <span class="nav-icon">❌</span> Lost
    </div>
    <div class="sidebar-section">Priority</div>
    <div class="nav-item no-select" onclick="setPriorityFilter('High',this)">
      <span class="nav-icon">🔴</span> High Priority
    </div>
    <div class="nav-item no-select" onclick="setPriorityFilter('Medium',this)">
      <span class="nav-icon">🟡</span> Medium
    </div>
    <div class="nav-item no-select" onclick="setPriorityFilter('Low',this)">
      <span class="nav-icon">🟢</span> Low Priority
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="ico">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name, email, company…" oninput="renderTable()"/>
      </div>
      <select class="filter-select" id="sortSelect" onchange="renderTable()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="name">Name A–Z</option>
      </select>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export</button>
    </div>

    <div class="contacts-area">
      <table id="contactsTable">
        <thead>
          <tr>
            <th>Contact</th>
            <th>Email / Phone</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Last Message</th>
            <th>Added</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none">
        <div class="emoji">📭</div>
        <p>No contacts yet. Add your first one!</p>
      </div>
    </div>
  </main>

  <!-- DETAIL PANEL -->
  <div class="detail-panel hidden" id="detailPanel">
    <div class="panel-header">
      <div class="panel-avatar" id="panelAvatar"></div>
      <div>
        <div class="panel-name" id="panelName"></div>
        <div class="panel-sub" id="panelSub"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Details</div>
      <div id="panelDetails"></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Notes</div>
      <textarea class="notes-area" id="panelNotes" placeholder="Add notes about this contact…"></textarea>
      <button class="btn btn-primary save-note-btn" onclick="saveNote()">Save Note</button>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Update Status</div>
      <select class="filter-select" id="panelStatus" style="width:100%" onchange="updateStatus()">
        <option>New Lead</option>
        <option>In Progress</option>
        <option>Closed</option>
        <option>Lost</option>
      </select>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add New Contact</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="f_name" placeholder="Jane Smith"/>
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" id="f_company" placeholder="Acme Corp"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="f_email" placeholder="jane@example.com"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="f_phone" placeholder="+971 50 000 0000"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f_status">
          <option>New Lead</option>
          <option>In Progress</option>
          <option>Closed</option>
          <option>Lost</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f_priority">
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Last Message / Note</label>
        <textarea id="f_msg" placeholder="What was the last conversation about?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem('inboxcrm_contacts') || '[]');
let currentFilter = 'all';
let priorityFilter = null;
let selectedId = null;
let editId = null;

const colors = ['c0','c1','c2','c3','c4'];
function getColor(name) {
  let s = 0; for (let c of name) s += c.charCodeAt(0);
  return colors[s % colors.length];
}
function initials(name) {
  return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function tagClass(status) {
  return {
    'New Lead': 'tag-new', 'In Progress': 'tag-inprogress',
    'Closed': 'tag-done', 'Lost': 'tag-lost'
  }[status] || 'tag-new';
}
function save() { localStorage.setItem('inboxcrm_contacts', JSON.stringify(contacts)); }

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list = [...contacts];
  if (currentFilter !== 'all') list = list.filter(c => c.status === currentFilter);
  if (priorityFilter) list = list.filter(c => c.priority === priorityFilter);
  if (q) list = list.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q) ||
    (c.company||'').toLowerCase().includes(q)
  );
  if (sort === 'name') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if (sort === 'oldest') list.sort((a,b)=>a.id-b.id);
  else list.sort((a,b)=>b.id-a.id);

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  document.getElementById('emptyState').style.display = list.length ? 'none' : 'flex';
  document.getElementById('contactsTable').style.display = list.length ? '' : 'none';

  list.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="name-cell">
          <div class="avatar ${getColor(c.name)}">${initials(c.name)}</div>
          <div><div class="name">${c.name}</div><div class="company">${c.company||'—'}</div></div>
        </div>
      </td>
      <td>
        <div style="font-size:0.84rem">${c.email||'—'}</div>
        <div style="font-size:0.76rem;color:var(--muted)">${c.phone||''}</div>
      </td>
      <td><span class="tag ${tagClass(c.status)}">${c.status}</span></td>
      <td><span style="font-size:0.82rem">${c.priority==='High'?'🔴':c.priority==='Medium'?'🟡':'🟢'} ${c.priority}</span></td>
      <td><div class="last-msg">${c.lastMsg||'—'}</div></td>
      <td style="font-size:0.78rem;color:var(--muted)">${new Date(c.id).toLocaleDateString()}</td>
      <td>
        <div class="td-actions">
          <button class="icon-btn" title="Edit" onclick="editContact(${c.id},event)">✏️</button>
          <button class="icon-btn" title="Delete" onclick="deleteContact(${c.id},event)">🗑️</button>
        </div>
      </td>
    `;
    tr.addEventListener('click', () => openPanel(c.id));
    tbody.appendChild(tr);
  });

  // update counts
  document.getElementById('totalCount').textContent = contacts.length;
  document.getElementById('openCount').textContent = contacts.filter(c=>c.status==='New Lead'||c.status==='In Progress').length;
  document.getElementById('allBadge').textContent = contacts.length;
  document.getElementById('newBadge').textContent = contacts.filter(c=>c.status==='New Lead').length;
}

function setFilter(f, el) {
  currentFilter = f; priorityFilter = null;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}
function setPriorityFilter(f, el) {
  priorityFilter = f; currentFilter = 'all';
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function openModal(id=null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Contact' : 'Add New Contact';
  if (id) {
    const c = contacts.find(x=>x.id===id);
    document.getElementById('f_name').value = c.name||'';
    document.getElementById('f_company').value = c.company||'';
    document.getElementById('f_email').value = c.email||'';
    document.getElementById('f_phone').value = c.phone||'';
    document.getElementById('f_status').value = c.status||'New Lead';
    document.getElementById('f_priority').value = c.priority||'Medium';
    document.getElementById('f_msg').value = c.lastMsg||'';
  } else {
    ['f_name','f_company','f_email','f_phone','f_msg'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f_status').value = 'New Lead';
    document.getElementById('f_priority').value = 'Medium';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editId = null; }

function saveContact() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const data = {
    name,
    company: document.getElementById('f_company').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    status: document.getElementById('f_status').value,
    priority: document.getElementById('f_priority').value,
    lastMsg: document.getElementById('f_msg').value.trim(),
  };
  if (editId) {
    const idx = contacts.findIndex(c=>c.id===editId);
    contacts[idx] = { ...contacts[idx], ...data };
    if (selectedId === editId) openPanel(editId);
  } else {
    data.id = Date.now(); data.notes = '';
    contacts.push(data);
  }
  save(); renderTable(); closeModal();
}

function deleteContact(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this contact?')) return;
  contacts = contacts.filter(c=>c.id!==id);
  if (selectedId === id) closePanel();
  save(); renderTable();
}
function editContact(id, e) { e.stopPropagation(); openModal(id); }

function openPanel(id) {
  selectedId = id;
  const c = contacts.find(x=>x.id===id);
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('hidden');
  const col = getColor(c.name);
  document.getElementById('panelAvatar').className = `panel-avatar ${col}`;
  document.getElementById('panelAvatar').textContent = initials(c.name);
  document.getElementById('panelName').textContent = c.name;
  document.getElementById('panelSub').textContent = c.company || c.email || '';
  document.getElementById('panelNotes').value = c.notes || '';
  document.getElementById('panelStatus').value = c.status;
  const det = document.getElementById('panelDetails');
  det.innerHTML = [
    ['Email', c.email||'—'],
    ['Phone', c.phone||'—'],
    ['Company', c.company||'—'],
    ['Priority', c.priority],
    ['Added', new Date(c.id).toLocaleDateString()],
    ['Last Message', c.lastMsg||'—'],
  ].map(([k,v])=>`<div class="info-row"><span class="key">${k}</span><span class="val">${v}</span></div>`).join('');
}
function closePanel() {
  document.getElementById('detailPanel').classList.add('hidden');
  selectedId = null;
}
function saveNote() {
  if (!selectedId) return;
  const idx = contacts.findIndex(c=>c.id===selectedId);
  contacts[idx].notes = document.getElementById('panelNotes').value;
  save();
  const btn = document.querySelector('.save-note-btn');
  btn.textContent = '✓ Saved!'; btn.style.background = 'var(--green)'; btn.style.color = '#000';
  setTimeout(()=>{ btn.textContent = 'Save Note'; btn.style.background=''; btn.style.color=''; }, 1500);
}
function updateStatus() {
  if (!selectedId) return;
  const idx = contacts.findIndex(c=>c.id===selectedId);
  contacts[idx].status = document.getElementById('panelStatus').value;
  save(); renderTable();
}

function exportCSV() {
  const headers = ['Name','Company','Email','Phone','Status','Priority','Last Message','Added'];
  const rows = contacts.map(c=>[
    c.name, c.company, c.email, c.phone, c.status, c.priority, c.lastMsg, new Date(c.id).toLocaleDateString()
  ].map(v=>`"${(v||'').replace(/"/g,'""')}"`));
  const csv = [headers, ...rows].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'inboxcrm_export.csv'; a.click();
}

// close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
